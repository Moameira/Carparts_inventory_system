name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: carparts_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: cd backend && npm install

      - name: Run migrations
        run: cd backend && npx knex migrate:latest
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: carparts_db
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: test_secret_key

      - name: Run seed
        run: cd backend && npx knex seed:run
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: carparts_db
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: test_secret_key

      - name: Run tests
        run: cd backend && npm test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: carparts_db
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: test_secret_key
